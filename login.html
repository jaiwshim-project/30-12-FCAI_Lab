<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — 미래역량AI연구소</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    @media (max-width: 639px) {
      .login-card, [class*="card"] { margin: 16px; padding: 24px 20px !important; }
      .btn { min-height: 44px; width: 100%; margin-bottom: 8px; }
    }
  </style>
</head>
<body>

<script src="js/config.js"></script>
<script src="js/categories-data.js"></script>
<script src="js/common.js"></script>

<!-- 이미 로그인된 경우 대시보드로 -->
<script>
  if (getCurrentUser()) window.location.href = 'dashboard.html';
</script>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#EEF2FF 0%,#E0E7FF 40%,#F0F9FF 100%);">

  <!-- 배경 장식 -->
  <div style="position:fixed;inset:0;pointer-events:none;overflow:hidden;">
    <div style="position:absolute;top:-20%;left:-10%;width:600px;height:600px;background:radial-gradient(circle,rgba(30,64,175,0.12),transparent 70%);border-radius:50%;"></div>
    <div style="position:absolute;bottom:-20%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(124,58,237,0.1),transparent 70%);border-radius:50%;"></div>
  </div>

  <div style="width:100%;max-width:460px;position:relative;z-index:1;">

    <!-- 로고 -->
    <div style="text-align:center;margin-bottom:32px;">
      <a href="index.html" style="display:inline-flex;align-items:center;gap:10px;text-decoration:none;">
        <div style="width:48px;height:48px;background:linear-gradient(135deg,#1E40AF,#7C3AED);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;">🎓</div>
        <div style="text-align:left;">
          <div style="font-weight:800;font-size:1.05rem;color:var(--text-primary);">미래역량AI연구소</div>
          <div style="font-size:0.75rem;color:var(--text-muted);">AI 학습 플랫폼</div>
        </div>
      </a>
    </div>

    <!-- 카드 -->
    <div style="background:#FFFFFF;border:1.5px solid rgba(59,130,246,0.2);border-radius:24px;padding:36px;box-shadow:0 8px 40px rgba(30,64,175,0.12);">

      <!-- 탭 -->
      <div style="display:flex;background:#EEF2FF;border-radius:12px;padding:4px;margin-bottom:28px;">
        <button class="tab-btn" id="loginTabBtn" data-tab="login"
          style="flex:1;padding:10px;border-radius:8px;font-size:0.875rem;font-weight:600;font-family:inherit;cursor:pointer;border:none;background:linear-gradient(135deg,#1E40AF,#7C3AED);color:white;transition:all 0.2s;">
          로그인
        </button>
        <button class="tab-btn" id="signupTabBtn" data-tab="signup"
          style="flex:1;padding:10px;border-radius:8px;font-size:0.875rem;font-weight:600;font-family:inherit;cursor:pointer;border:none;background:transparent;color:var(--text-secondary);transition:all 0.2s;">
          회원가입
        </button>
      </div>

      <!-- 구글 OAuth 버튼 -->
      <button class="btn btn-secondary btn-block btn-lg" id="googleBtn" style="margin-bottom:20px;gap:10px;background:#FFFFFF;border:1.5px solid rgba(59,130,246,0.25);color:#0F172A;">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google로 계속하기
      </button>

      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
        <div style="flex:1;height:1px;background:var(--border-color);"></div>
        <span style="font-size:0.75rem;color:var(--text-muted);">또는 이메일로</span>
        <div style="flex:1;height:1px;background:var(--border-color);"></div>
      </div>

      <!-- 로그인 폼 -->
      <form id="loginForm" style="display:block;">
        <div class="form-group" style="margin-bottom:16px;">
          <label class="form-label" for="loginEmail">이메일</label>
          <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="form-group" style="margin-bottom:8px;">
          <label class="form-label" for="loginPw">비밀번호</label>
          <div style="position:relative;">
            <input type="password" class="form-input" id="loginPw" placeholder="비밀번호 입력" autocomplete="current-password" required
              style="padding-right:44px;" />
            <button type="button" onclick="togglePw('loginPw')"
              style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);background:none;border:none;cursor:pointer;font-size:1rem;">
              👁
            </button>
          </div>
        </div>
        <div style="text-align:right;margin-bottom:20px;">
          <a href="#" style="font-size:0.8rem;color:var(--color-primary-light);">비밀번호 찾기</a>
        </div>
        <div id="loginError" style="display:none;padding:10px 14px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:8px;font-size:0.8rem;color:#DC2626;margin-bottom:16px;"></div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginSubmitBtn">
          로그인
        </button>
      </form>

      <!-- 회원가입 폼 -->
      <form id="signupForm" style="display:none;">
        <div class="form-group" style="margin-bottom:16px;">
          <label class="form-label" for="signupName">이름</label>
          <input type="text" class="form-input" id="signupName" placeholder="홍길동" autocomplete="name" required />
        </div>
        <div class="form-group" style="margin-bottom:16px;">
          <label class="form-label" for="signupEmail">이메일</label>
          <input type="email" class="form-input" id="signupEmail" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="form-group" style="margin-bottom:16px;">
          <label class="form-label" for="signupPw">비밀번호</label>
          <div style="position:relative;">
            <input type="password" class="form-input" id="signupPw" placeholder="8자 이상 입력" autocomplete="new-password" required
              style="padding-right:44px;" />
            <button type="button" onclick="togglePw('signupPw')"
              style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);background:none;border:none;cursor:pointer;font-size:1rem;">
              👁
            </button>
          </div>
          <!-- 비밀번호 강도 -->
          <div id="pwStrengthWrap" style="margin-top:8px;">
            <div class="progress-bar-track thin">
              <div class="progress-bar-fill" id="pwStrengthBar" style="width:0%;"></div>
            </div>
            <div style="font-size:0.7rem;color:var(--text-muted);margin-top:4px;" id="pwStrengthLabel"></div>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:20px;">
          <label class="form-label" for="signupPwConfirm">비밀번호 확인</label>
          <input type="password" class="form-input" id="signupPwConfirm" placeholder="비밀번호 재입력" autocomplete="new-password" required />
          <div id="pwMatchMsg" style="font-size:0.75rem;margin-top:4px;"></div>
        </div>
        <div id="signupError" style="display:none;padding:10px 14px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:8px;font-size:0.8rem;color:#DC2626;margin-bottom:16px;"></div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="signupSubmitBtn">
          회원가입
        </button>
        <p style="font-size:0.75rem;color:var(--text-muted);text-align:center;margin-top:12px;line-height:1.5;">
          가입하면 <a href="#" style="color:var(--color-primary-light);">서비스 이용약관</a> 및
          <a href="#" style="color:var(--color-primary-light);">개인정보 처리방침</a>에 동의합니다.
        </p>
      </form>

    </div>

    <!-- 하단 링크 -->
    <p style="text-align:center;margin-top:20px;font-size:0.8rem;color:var(--text-muted);">
      <a href="index.html" style="color:var(--color-primary-light);">← 메인으로 돌아가기</a>
    </p>

  </div>
</div>

<div id="siteFooter"></div>
<script>injectFooter();</script>

<div id="toast-container"></div>

<script src="js/supabase.js" onerror="console.warn('supabase.js 없음')"></script>
<script>
const redirectTo = getUrlParam('redirect', 'dashboard.html');

// ── 탭 전환 ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('loginForm').style.display  = isLogin ? 'block' : 'none';
  document.getElementById('signupForm').style.display = isLogin ? 'none'  : 'block';

  document.getElementById('loginTabBtn').style.background  = isLogin ? 'linear-gradient(135deg,#1E40AF,#7C3AED)' : 'transparent';
  document.getElementById('loginTabBtn').style.color       = isLogin ? 'white' : 'var(--text-secondary)';
  document.getElementById('signupTabBtn').style.background = isLogin ? 'transparent' : 'linear-gradient(135deg,#1E40AF,#7C3AED)';
  document.getElementById('signupTabBtn').style.color      = isLogin ? 'var(--text-secondary)' : 'white';
}

// ── 비밀번호 보기/숨기기 ──
function togglePw(inputId) {
  const el = document.getElementById(inputId);
  el.type = el.type === 'password' ? 'text' : 'password';
}

// ── 비밀번호 강도 측정 ──
document.getElementById('signupPw')?.addEventListener('input', function() {
  const v = this.value;
  let score = 0;
  if (v.length >= 8)  score += 25;
  if (v.length >= 12) score += 15;
  if (/[A-Z]/.test(v)) score += 20;
  if (/[0-9]/.test(v)) score += 20;
  if (/[^A-Za-z0-9]/.test(v)) score += 20;

  const bar = document.getElementById('pwStrengthBar');
  const label = document.getElementById('pwStrengthLabel');
  bar.style.width = score + '%';

  if (score < 40) {
    bar.style.background = '#F87171';
    label.textContent = '약함';
    label.style.color = '#F87171';
  } else if (score < 70) {
    bar.style.background = '#F59E0B';
    label.textContent = '보통';
    label.style.color = '#F59E0B';
  } else {
    bar.style.background = 'var(--color-accent-light)';
    label.textContent = '강함';
    label.style.color = 'var(--color-accent-light)';
  }
});

document.getElementById('signupPwConfirm')?.addEventListener('input', function() {
  const pw = document.getElementById('signupPw').value;
  const msg = document.getElementById('pwMatchMsg');
  if (!this.value) { msg.textContent = ''; return; }
  if (this.value === pw) {
    msg.textContent = '✓ 일치합니다';
    msg.style.color = 'var(--color-accent-light)';
  } else {
    msg.textContent = '✗ 일치하지 않습니다';
    msg.style.color = '#F87171';
  }
});

// ── 구글 로그인 ──
document.getElementById('googleBtn')?.addEventListener('click', async () => {
  if (window.supabaseClient) {
    try {
      const { error } = await window.supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/dashboard.html' },
      });
      if (error) throw error;
    } catch(e) {
      showToast('구글 로그인 실패', 'error', e.message);
    }
  } else {
    // 더미: 로컬스토리지에 사용자 저장
    _mockLogin({ email: 'demo@google.com', name: '구글 사용자', provider: 'google' });
  }
});

// ── 로그인 폼 제출 ──
document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const pw    = document.getElementById('loginPw').value;
  const errEl = document.getElementById('loginError');
  const btn   = document.getElementById('loginSubmitBtn');

  errEl.style.display = 'none';
  btn.classList.add('btn-loading');
  btn.disabled = true;

  try {
    if (window.supabaseClient) {
      const { data, error } = await window.supabaseClient.auth.signInWithPassword({ email, password: pw });
      if (error) throw error;
      _mockLogin({ email: data.user.email, id: data.user.id });
    } else {
      // 더미 로그인 (이메일/비밀번호 검증 없이)
      if (!email || !pw) throw new Error('이메일과 비밀번호를 입력하세요.');
      await new Promise(r => setTimeout(r, 600));
      _mockLogin({ email, name: email.split('@')[0] });
    }
  } catch(err) {
    errEl.textContent = err.message || '로그인 실패. 이메일과 비밀번호를 확인하세요.';
    errEl.style.display = 'block';
    btn.classList.remove('btn-loading');
    btn.disabled = false;
  }
});

// ── 회원가입 폼 제출 ──
document.getElementById('signupForm')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  const name  = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const pw    = document.getElementById('signupPw').value;
  const pwc   = document.getElementById('signupPwConfirm').value;
  const errEl = document.getElementById('signupError');
  const btn   = document.getElementById('signupSubmitBtn');

  errEl.style.display = 'none';

  if (pw !== pwc) {
    errEl.textContent = '비밀번호가 일치하지 않습니다.';
    errEl.style.display = 'block';
    return;
  }
  if (pw.length < 8) {
    errEl.textContent = '비밀번호는 8자 이상이어야 합니다.';
    errEl.style.display = 'block';
    return;
  }

  btn.classList.add('btn-loading');
  btn.disabled = true;

  try {
    if (window.supabaseClient) {
      const { data, error } = await window.supabaseClient.auth.signUp({
        email,
        password: pw,
        options: { data: { full_name: name } },
      });
      if (error) throw error;
      showToast('회원가입 성공!', 'success', '이메일을 확인해주세요.');
      _mockLogin({ email, name });
    } else {
      await new Promise(r => setTimeout(r, 700));
      _mockLogin({ email, name });
    }
  } catch(err) {
    errEl.textContent = err.message || '회원가입 실패. 다시 시도하세요.';
    errEl.style.display = 'block';
    btn.classList.remove('btn-loading');
    btn.disabled = false;
  }
});

function _mockLogin(user) {
  localStorage.setItem('fc_user', JSON.stringify({
    ...user,
    login_at: new Date().toISOString(),
  }));
  showToast('로그인 성공!', 'success', `${user.name || user.email}님, 환영합니다.`);
  setTimeout(() => {
    window.location.href = decodeURIComponent(redirectTo);
  }, 800);
}
</script>
</body>
</html>
