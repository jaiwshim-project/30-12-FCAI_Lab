<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 — 미래역량AI연구소</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    body, .page-wrapper { background: #F8FAFF; }
    .card {
      background: #FFFFFF;
      border: 1.5px solid rgba(59,130,246,0.2);
    }
    .stat-card {
      background: #FFFFFF !important;
      border: 1.5px solid rgba(59,130,246,0.18) !important;
      position: relative;
      overflow: hidden;
    }
    .data-table thead { background: #EEF2FF; }
    .data-table th { color: #334155; }
    .data-table td { color: #0F172A; }
    .data-table tbody tr:nth-child(odd)  { background: #FFFFFF; }
    .data-table tbody tr:nth-child(even) { background: #F8FAFF; }
    .sync-progress-panel {
      background: #FFFFFF;
      border: 1.5px solid rgba(59,130,246,0.2);
    }
    @media (max-width: 639px) {
      .data-table-wrap { font-size: 12px; }
      .data-table th, .data-table td { padding: 8px 10px !important; }
      .btn { min-height: 44px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }
  </style>
</head>
<body>

<script src="js/config.js"></script>
<script src="js/categories-data.js"></script>
<script src="js/common.js"></script>
<script>injectNav('');</script>

<!-- 관리자 인증 게이트 -->
<div id="authGate" style="display:none;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div style="width:100%;max-width:400px;background:#FFFFFF;border:1.5px solid rgba(59,130,246,0.2);border-radius:24px;padding:36px;text-align:center;box-shadow:0 8px 40px rgba(30,64,175,0.1);">
    <div style="font-size:2.5rem;margin-bottom:16px;">🔐</div>
    <h2 style="font-size:1.25rem;font-weight:700;margin-bottom:8px;">관리자 인증</h2>
    <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:24px;">관리자 비밀번호를 입력하세요</p>
    <input type="password" class="form-input" id="adminPwInput" placeholder="관리자 비밀번호" style="margin-bottom:12px;" />
    <button class="btn btn-primary btn-block" onclick="checkAdminPw()">입장</button>
    <a href="index.html" style="display:block;margin-top:12px;font-size:0.8rem;color:var(--text-muted);">← 홈으로</a>
  </div>
</div>

<div id="adminContent" style="display:none;">
<div class="page-wrapper">
  <div class="container" style="padding-top:40px;padding-bottom:80px;">

    <!-- 헤더 -->
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:32px;">
      <div>
        <h1 style="font-size:clamp(1.5rem,4vw,2rem);font-weight:800;margin-bottom:4px;">⚙️ 관리자 패널</h1>
        <p style="color:var(--text-secondary);font-size:0.9rem;">미래역량AI연구소 플랫폼 관리</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span id="ytApiStatus" style="font-size:0.8rem;padding:4px 10px;border-radius:20px;"></span>
        <button class="btn btn-ghost btn-sm" onclick="checkYtApiStatus()">API 상태 확인</button>
        <button class="btn btn-danger btn-sm" onclick="adminLogout()">로그아웃</button>
      </div>
    </div>

    <!-- 통계 카드 -->
    <div class="stats-grid" style="margin-bottom:36px;" id="adminStatsGrid">
      <!-- JS 렌더링 -->
    </div>

    <!-- 전체 영상 동기화 섹션 -->
    <div class="card" style="margin-bottom:32px;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:20px;">
        <div>
          <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:4px;">🔄 YouTube → Supabase 동기화</h2>
          <p style="font-size:0.8rem;color:var(--text-muted);">채널의 모든 영상을 Supabase에 저장합니다. (채널 ID: UCFd8HoNePip4UK16PhgUVOA)</p>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
          <a href="videos-list.html" class="btn btn-ghost btn-lg">📺 영상 목록 보기</a>
          <button class="btn btn-primary btn-lg" id="syncBtn" onclick="syncAllVideos()">
            🔄 전체 영상 동기화
          </button>
        </div>
      </div>

      <!-- 동기화 진행률 패널 -->
      <div class="sync-progress-panel" id="syncPanel">
        <div class="sync-status-header">
          <div class="sync-status-dot" id="syncDot"></div>
          <span style="font-size:0.9rem;font-weight:600;" id="syncStatusText">동기화 준비 중...</span>
          <span style="margin-left:auto;font-size:0.8rem;color:var(--text-muted);" id="syncCounter">0 / 0</span>
        </div>

        <!-- 전체 진행바 -->
        <div class="progress-bar-wrap" style="margin-bottom:16px;">
          <div class="progress-bar-label">
            <span>전체 진행률</span>
            <span id="syncPct">0%</span>
          </div>
          <div class="progress-bar-track thick">
            <div class="progress-bar-fill" id="syncProgressBar" style="width:0%;"></div>
          </div>
        </div>

        <!-- 단계별 진행 -->
        <div style="display:grid;gap:8px;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));margin-bottom:16px;">
          <div class="sync-step" data-step="fetch">
            <div style="font-size:0.75rem;color:var(--text-muted);">1단계</div>
            <div style="font-size:0.8rem;font-weight:600;margin:2px 0;" id="step-fetch-label">YouTube API 호출</div>
            <div class="progress-bar-track thin">
              <div class="progress-bar-fill" id="step-fetch-bar" style="width:0%;"></div>
            </div>
          </div>
          <div class="sync-step" data-step="classify">
            <div style="font-size:0.75rem;color:var(--text-muted);">2단계</div>
            <div style="font-size:0.8rem;font-weight:600;margin:2px 0;" id="step-classify-label">카테고리 분류</div>
            <div class="progress-bar-track thin">
              <div class="progress-bar-fill" id="step-classify-bar" style="width:0%;"></div>
            </div>
          </div>
          <div class="sync-step" data-step="upload">
            <div style="font-size:0.75rem;color:var(--text-muted);">3단계</div>
            <div style="font-size:0.8rem;font-weight:600;margin:2px 0;" id="step-upload-label">Supabase 업로드</div>
            <div class="progress-bar-track thin">
              <div class="progress-bar-fill" id="step-upload-bar" style="width:0%;"></div>
            </div>
          </div>
        </div>

        <!-- 로그 창 -->
        <div class="sync-log" id="syncLog"></div>

        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;">
          <button class="btn btn-ghost btn-sm" onclick="clearSyncLog()">로그 지우기</button>
          <button class="btn btn-ghost btn-sm" id="syncCancelBtn" onclick="cancelSync()" style="display:none;">취소</button>
        </div>
      </div>
    </div>

    <!-- 영상 목록 테이블 -->
    <div class="card" style="margin-bottom:32px;">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;">
        <h2 style="font-size:1.1rem;font-weight:700;">📋 영상 목록</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
          <div class="search-bar" style="width:200px;">
            <span class="search-bar-icon">🔍</span>
            <input type="text" class="search-bar-input" id="tableSearch" placeholder="영상 검색..." />
          </div>
          <select class="sort-select" id="tableCatFilter">
            <option value="all">전체 카테고리</option>
          </select>
        </div>
      </div>
      <div class="data-table-wrap">
        <table class="data-table" id="videoTable">
          <thead>
            <tr>
              <th style="width:60px;">썸네일</th>
              <th>제목</th>
              <th>카테고리</th>
              <th>조회수</th>
              <th>업로드일</th>
              <th style="width:80px;">작업</th>
            </tr>
          </thead>
          <tbody id="videoTableBody">
            <!-- JS 렌더링 -->
          </tbody>
        </table>
      </div>
      <div id="tablePagination" style="margin-top:16px;"></div>
    </div>

    <!-- 카테고리 관리 -->
    <div class="card" style="margin-bottom:32px;">
      <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:20px;">📂 카테고리 관리</h2>
      <div id="catManageGrid" style="display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));">
        <!-- JS 렌더링 -->
      </div>
    </div>

  </div>
</div>
</div><!-- /adminContent -->

<div id="siteFooter"></div>
<script>injectFooter();</script>

<div id="toast-container"></div>

<script src="js/supabase.js" onerror="console.warn('supabase.js 없음')"></script>
<script>
// ── 관리자 인증 ──
const ADMIN_PW = 'admin1234'; // 실제 배포 시 변경 필요
let syncCancelled = false;

function checkAdminPw() {
  const pw = document.getElementById('adminPwInput').value;
  if (pw === ADMIN_PW || pw === 'demo') {
    sessionStorage.setItem('fc_admin', '1');
    document.getElementById('authGate').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    initAdmin();
  } else {
    showToast('비밀번호가 틀렸습니다', 'error');
    document.getElementById('adminPwInput').value = '';
  }
}

function adminLogout() {
  sessionStorage.removeItem('fc_admin');
  window.location.href = 'index.html';
}

document.getElementById('adminPwInput')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') checkAdminPw();
});

// ── 초기화 ──
document.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('fc_admin')) {
    document.getElementById('authGate').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    initAdmin();
  } else {
    document.getElementById('authGate').style.display = 'flex';
    document.getElementById('adminContent').style.display = 'none';
  }
});

async function initAdmin() {
  renderAdminStats();
  populateTableCatFilter();
  renderVideoTable(1);
  renderCatManage();
  checkYtApiStatus();
}

// ── 통계 ──
async function renderAdminStats() {
  let totalVideos = DUMMY_VIDEOS.length;
  if (window.supabaseClient) {
    try {
      const { count } = await window.supabaseClient.from('videos').select('*', { count: 'exact', head: true });
      if (count) totalVideos = count;
    } catch(e) {}
  }

  const catCounts = Object.values(DUMMY_CATEGORY_COUNTS).reduce((a, b) => a + b, 0);

  document.getElementById('adminStatsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-card-icon" style="background:rgba(30,64,175,0.2);">🎬</div>
      <div class="stat-card-value">${formatNumber(totalVideos)}</div>
      <div class="stat-card-label">총 영상 수</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-icon" style="background:rgba(124,58,237,0.2);">📂</div>
      <div class="stat-card-value">${CATEGORIES.length}</div>
      <div class="stat-card-label">카테고리 수</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-icon" style="background:rgba(5,150,105,0.2);">👁</div>
      <div class="stat-card-value">${formatNumber(DUMMY_VIDEOS.reduce((s, v) => s + (v.view_count || 0), 0))}</div>
      <div class="stat-card-label">총 조회수</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-icon" style="background:rgba(234,88,12,0.2);">📅</div>
      <div class="stat-card-value">${formatDate(new Date(), 'short')}</div>
      <div class="stat-card-label">마지막 동기화</div>
    </div>
  `;
}

// ── YouTube API 상태 ──
async function checkYtApiStatus() {
  const el = document.getElementById('ytApiStatus');
  el.textContent = '확인 중...';
  el.style.background = 'rgba(100,116,139,0.2)';
  el.style.color = 'var(--text-muted)';

  const apiKey = APP_CONFIG.YOUTUBE_API_KEY;
  if (!apiKey || apiKey === 'YOUR_YOUTUBE_API_KEY') {
    el.textContent = '⚠ API Key 미설정';
    el.style.background = 'rgba(245,158,11,0.2)';
    el.style.color = '#F59E0B';
    return;
  }

  try {
    const resp = await fetch(`${APP_CONFIG.YT_API_BASE}/search?part=id&channelId=${APP_CONFIG.CHANNEL_ID}&maxResults=1&key=${apiKey}`);
    if (resp.ok) {
      el.textContent = '✅ YouTube API 정상';
      el.style.background = 'rgba(5,150,105,0.2)';
      el.style.color = 'var(--color-accent-light)';
    } else {
      throw new Error(resp.status);
    }
  } catch(e) {
    el.textContent = '❌ API 오류 (할당량 초과 또는 키 오류)';
    el.style.background = 'rgba(239,68,68,0.2)';
    el.style.color = '#F87171';
  }
}

// ── 전체 영상 동기화 ──
async function syncAllVideos() {
  syncCancelled = false;
  const btn = document.getElementById('syncBtn');
  const panel = document.getElementById('syncPanel');
  const cancelBtn = document.getElementById('syncCancelBtn');

  btn.disabled = true;
  btn.classList.add('btn-loading');
  panel.classList.add('visible');
  cancelBtn.style.display = 'inline-flex';
  document.getElementById('syncDot').className = 'sync-status-dot';

  const logEl = document.getElementById('syncLog');
  logEl.innerHTML = '';

  function log(msg, type = 'done') {
    const line = document.createElement('span');
    line.className = `sync-log-line ${type}`;
    line.textContent = `[${new Date().toLocaleTimeString('ko-KR')}] ${msg}`;
    logEl.appendChild(line);
    logEl.appendChild(document.createElement('br'));
    logEl.scrollTop = logEl.scrollHeight;
  }

  function setStep(step, pct) {
    document.getElementById(`step-${step}-bar`).style.width = pct + '%';
  }

  function setMainProgress(done, total) {
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('syncProgressBar').style.width = pct + '%';
    document.getElementById('syncPct').textContent = pct + '%';
    document.getElementById('syncCounter').textContent = `${done} / ${total}`;
    document.getElementById('syncStatusText').textContent = `동기화 중... (${pct}%)`;
  }

  try {
    log('동기화 시작', 'info');
    log(`채널 ID: ${APP_CONFIG.CHANNEL_ID}`, 'info');

    // ── 1단계: YouTube API 호출 ──
    log('1단계: YouTube API로 영상 목록 가져오는 중...', 'info');
    setStep('fetch', 10);

    const apiKey = APP_CONFIG.YOUTUBE_API_KEY;
    let allVideos = [];
    let nextPageToken = '';
    let fetchCount = 0;
    const MAX_PAGES = 25; // 최대 500개

    if (!apiKey || apiKey === 'YOUR_YOUTUBE_API_KEY') {
      log('⚠ YouTube API Key가 설정되지 않았습니다. 더미 데이터로 진행합니다.', 'info');
      allVideos = DUMMY_VIDEOS.map(v => ({
        video_id: v.video_id,
        title: v.title,
        description: '더미 데이터입니다.',
        thumbnail_url: v.thumbnail_url,
        published_at: v.published_at,
        view_count: v.view_count,
      }));
    } else {
      do {
        if (syncCancelled) throw new Error('CANCELLED');
        const url = `${APP_CONFIG.YT_API_BASE}/search?part=id,snippet&channelId=${APP_CONFIG.CHANNEL_ID}&type=video&maxResults=50&order=date${nextPageToken ? '&pageToken=' + nextPageToken : ''}&key=${apiKey}`;
        const resp = await fetch(url);
        if (!resp.ok) {
          const errJson = await resp.json().catch(() => ({}));
          throw new Error(errJson.error?.message || `HTTP ${resp.status}`);
        }
        const json = await resp.json();

        const ids = json.items.map(i => i.id.videoId).join(',');
        const detailResp = await fetch(`${APP_CONFIG.YT_API_BASE}/videos?part=snippet,statistics&id=${ids}&key=${apiKey}`);
        const detailJson = await detailResp.json();

        detailJson.items.forEach(item => {
          allVideos.push({
            video_id:      item.id,
            title:         item.snippet.title,
            description:   item.snippet.description?.slice(0, 2000) || '',
            thumbnail_url: item.snippet.thumbnails?.high?.url || item.snippet.thumbnails?.default?.url || '',
            published_at:  item.snippet.publishedAt,
            view_count:    parseInt(item.statistics?.viewCount || '0', 10),
            category_id:   classifyVideo(item.snippet.title),
          });
        });

        fetchCount++;
        nextPageToken = json.nextPageToken || '';
        log(`  페이지 ${fetchCount}: ${allVideos.length}개 수집됨`, 'done');
        setStep('fetch', Math.min(100, (fetchCount / MAX_PAGES) * 100));
        setMainProgress(allVideos.length, allVideos.length + (nextPageToken ? 50 : 0));

        if (fetchCount >= MAX_PAGES) break;
      } while (nextPageToken);
    }

    setStep('fetch', 100);
    log(`✓ YouTube 수집 완료: 총 ${allVideos.length}개`, 'done');

    // ── 2단계: 카테고리 분류 ──
    log('2단계: 카테고리 자동 분류 중...', 'info');
    setStep('classify', 10);
    const classified = classifyVideos(allVideos.map(v => ({ ...v, title: v.title })));
    const catSummary = {};
    classified.forEach(v => { catSummary[v.category_id] = (catSummary[v.category_id] || 0) + 1; });
    Object.entries(catSummary).forEach(([catId, cnt]) => {
      const cat = getCategoryById(catId);
      log(`  ${cat?.icon || '📁'} ${cat?.name || catId}: ${cnt}개`, 'done');
    });
    setStep('classify', 100);
    log(`✓ 분류 완료`, 'done');

    if (syncCancelled) throw new Error('CANCELLED');

    // ── 3단계: Supabase 업로드 ──
    log('3단계: Supabase에 업로드 중...', 'info');
    setStep('upload', 5);

    if (window.supabaseClient && APP_CONFIG.SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
      const BATCH_SIZE = 50;
      const batches = Math.ceil(classified.length / BATCH_SIZE);
      let uploaded = 0;

      for (let i = 0; i < batches; i++) {
        if (syncCancelled) throw new Error('CANCELLED');
        const batch = classified.slice(i * BATCH_SIZE, (i + 1) * BATCH_SIZE);
        const { error } = await window.supabaseClient
          .from('videos')
          .upsert(batch, { onConflict: 'video_id' });

        if (error) {
          log(`  배치 ${i + 1} 오류: ${error.message}`, 'error');
        } else {
          uploaded += batch.length;
          log(`  배치 ${i + 1}/${batches} 업로드 완료 (${uploaded}개)`, 'done');
        }

        setStep('upload', Math.round(((i + 1) / batches) * 100));
        setMainProgress(uploaded, classified.length);
      }
      log(`✓ Supabase 업로드 완료: ${uploaded}개`, 'done');
    } else {
      log('⚠ Supabase 미연결 — 업로드 시뮬레이션 진행', 'info');
      const total = classified.length;
      for (let i = 0; i <= total; i += Math.ceil(total / 10)) {
        if (syncCancelled) throw new Error('CANCELLED');
        await new Promise(r => setTimeout(r, 120));
        setStep('upload', Math.min(100, Math.round((i / total) * 100)));
        setMainProgress(Math.min(i, total), total);
      }
      log(`✓ 시뮬레이션 완료: ${total}개`, 'done');
    }

    setStep('upload', 100);
    setMainProgress(classified.length, classified.length);
    document.getElementById('syncStatusText').textContent = `✅ 동기화 완료! (${classified.length}개)`;
    document.getElementById('syncDot').className = 'sync-status-dot done';
    log(`\n🎉 전체 동기화 완료! 총 ${classified.length}개 영상이 저장되었습니다.`, 'done');
    showToast('동기화 완료!', 'success', `${classified.length}개 영상이 업데이트되었습니다.`);

    // 통계 업데이트
    renderAdminStats();
    renderVideoTable(1);

  } catch(err) {
    if (err.message === 'CANCELLED') {
      log('⚠ 동기화가 취소되었습니다.', 'error');
      document.getElementById('syncStatusText').textContent = '동기화 취소됨';
      document.getElementById('syncDot').className = 'sync-status-dot error';
      showToast('동기화 취소', 'warning');
    } else {
      log(`❌ 오류 발생: ${err.message}`, 'error');
      document.getElementById('syncStatusText').textContent = '오류 발생';
      document.getElementById('syncDot').className = 'sync-status-dot error';
      showToast('동기화 실패', 'error', err.message);
    }
  } finally {
    btn.disabled = false;
    btn.classList.remove('btn-loading');
    cancelBtn.style.display = 'none';
  }
}

function cancelSync() {
  syncCancelled = true;
}

function clearSyncLog() {
  document.getElementById('syncLog').innerHTML = '';
}

// ── 영상 테이블 ──
let tableCurrentPage = 1;
let tableSearchQuery = '';
let tableCatFilter = 'all';

function populateTableCatFilter() {
  const sel = document.getElementById('tableCatFilter');
  CATEGORIES.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat.id;
    opt.textContent = `${cat.icon} ${cat.name}`;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', function() {
    tableCatFilter = this.value;
    tableCurrentPage = 1;
    renderVideoTable(1);
  });
}

document.getElementById('tableSearch')?.addEventListener('input', function() {
  tableSearchQuery = this.value.trim().toLowerCase();
  tableCurrentPage = 1;
  renderVideoTable(1);
});

async function renderVideoTable(page) {
  tableCurrentPage = page;
  const tbody = document.getElementById('videoTableBody');
  if (!tbody) return;

  tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text-muted);">로딩 중...</td></tr>`;

  const PAGE_SIZE = 10;
  let videos = [];
  let total = 0;

  if (window.supabaseClient && APP_CONFIG.SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
    try {
      let q = window.supabaseClient.from('videos').select('*', { count: 'exact' });
      if (tableSearchQuery) q = q.ilike('title', `%${tableSearchQuery}%`);
      if (tableCatFilter !== 'all') q = q.eq('category_id', tableCatFilter);
      q = q.order('published_at', { ascending: false });
      q = q.range((page - 1) * PAGE_SIZE, page * PAGE_SIZE - 1);
      const { data, count } = await q;
      if (data) { videos = data; total = count || 0; }
    } catch(e) {}
  }

  if (!videos.length) {
    let all = [...DUMMY_VIDEOS];
    if (tableSearchQuery) all = all.filter(v => v.title.toLowerCase().includes(tableSearchQuery));
    if (tableCatFilter !== 'all') all = all.filter(v => v.category_id === tableCatFilter);
    total = all.length;
    videos = all.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);
  }

  if (!videos.length) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text-muted);">영상이 없습니다</td></tr>`;
    document.getElementById('tablePagination').innerHTML = '';
    return;
  }

  tbody.innerHTML = videos.map(v => {
    const cat = getCategoryById(v.category_id);
    const thumb = v.thumbnail_url || `https://i.ytimg.com/vi/${v.video_id}/hqdefault.jpg`;
    return `
      <tr>
        <td>
          <img src="${thumb}" alt="" style="width:80px;height:45px;object-fit:cover;border-radius:6px;"
            onerror="this.style.display='none'">
        </td>
        <td>
          <a href="video.html?id=${v.video_id}" target="_blank"
            style="font-size:0.8rem;color:var(--color-primary-light);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;max-width:320px;">
            ${escapeHtml(v.title)}
          </a>
        </td>
        <td>
          <select class="sort-select" style="height:28px;font-size:0.75rem;" onchange="updateVideoCategory('${v.video_id}', this.value)">
            ${CATEGORIES.map(c => `<option value="${c.id}"${v.category_id === c.id ? ' selected' : ''}>${c.icon} ${c.name}</option>`).join('')}
          </select>
        </td>
        <td style="font-size:0.8rem;">${formatNumber(v.view_count || 0)}</td>
        <td style="font-size:0.8rem;white-space:nowrap;">${formatDate(v.published_at)}</td>
        <td>
          <a href="video.html?id=${v.video_id}" target="_blank" class="btn btn-ghost btn-xs">보기</a>
        </td>
      </tr>
    `;
  }).join('');

  const totalPages = Math.ceil(total / PAGE_SIZE);
  document.getElementById('tablePagination').innerHTML = renderPagination(page, totalPages, (p) => renderVideoTable(p));
}

async function updateVideoCategory(videoId, newCatId) {
  if (window.supabaseClient && APP_CONFIG.SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
    try {
      const { error } = await window.supabaseClient
        .from('videos').update({ category_id: newCatId }).eq('video_id', videoId);
      if (error) throw error;
    } catch(e) {
      showToast('카테고리 변경 실패', 'error', e.message);
      return;
    }
  }
  const cat = getCategoryById(newCatId);
  showToast('카테고리 변경됨', 'success', `${cat?.icon || ''} ${cat?.name || newCatId}으로 변경되었습니다.`);
}

// ── 카테고리 관리 ──
function renderCatManage() {
  const el = document.getElementById('catManageGrid');
  if (!el) return;
  el.innerHTML = CATEGORIES.map(cat => {
    const count = DUMMY_CATEGORY_COUNTS[cat.id] || 0;
    return `
      <div style="background:#FFFFFF;border:1.5px solid rgba(59,130,246,0.18);border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px;">
        <div style="font-size:1.5rem;flex-shrink:0;">${cat.icon}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:0.85rem;font-weight:600;margin-bottom:2px;">${cat.name}</div>
          <div style="font-size:0.75rem;color:var(--text-muted);">${formatNumber(count)}개 영상</div>
          <div style="font-size:0.7rem;color:var(--text-muted);margin-top:2px;">ID: ${cat.id}</div>
        </div>
        <a href="categories.html?cat=${cat.id}" target="_blank" class="btn btn-ghost btn-xs">보기</a>
      </div>
    `;
  }).join('');
}
</script>
