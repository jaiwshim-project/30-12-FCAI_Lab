<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 학습 도우미 — 미래역량AI연구소</title>
  <meta name="description" content="AI 학습 도우미 — 미래역량AI연구소 영상 추천, 질문 답변, 학습 가이드" />
  <style>
    /* ── 기본 리셋 & 화이트 테마 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #F8FAFF;
      --surface: #FFFFFF;
      --border:  rgba(59,130,246,.2);
      --blue:    #1D4ED8;
      --purple:  #7C3AED;
      --text:    #0F172A;
      --muted:   #64748B;
      --accent:  #1D4ED8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    a { color: #1D4ED8; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── 헤더 ── */
    .chat-header {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .chat-header .logo {
      width: 42px; height: 42px;
      background: rgba(255,255,255,.15);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .chat-header h1 { font-size: 16px; font-weight: 700; color: #fff; }
    .chat-header p  { font-size: 11px; color: rgba(255,255,255,.75); margin-top: 2px; }
    .header-actions { margin-left: auto; display: flex; gap: 8px; }
    .header-actions a {
      background: rgba(255,255,255,.15);
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      padding: 6px 12px;
      transition: background .15s;
      text-decoration: none;
    }
    .header-actions a:hover { background: rgba(255,255,255,.25); }

    /* ── 레이아웃 ── */
    .chat-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── 사이드바 (데스크탑) ── */
    .chat-sidebar {
      width: 260px;
      flex-shrink: 0;
      border-right: 1.5px solid rgba(59,130,246,.2);
      background: #FFFFFF;
      padding: 20px 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .sidebar-section h3 {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 10px;
    }
    .quick-btn {
      display: block;
      width: 100%;
      background: #F8FAFF;
      border: 1.5px solid rgba(59,130,246,.2);
      border-radius: 10px;
      color: #0F172A;
      cursor: pointer;
      font-size: 13px;
      padding: 10px 12px;
      text-align: left;
      margin-bottom: 6px;
      transition: background .15s, border-color .15s;
      font-family: inherit;
    }
    .quick-btn:hover {
      background: #EEF2FF;
      border-color: #1D4ED8;
      color: #1D4ED8;
    }
    .quick-btn .icon { margin-right: 8px; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-card {
      background: #FFFFFF;
      border: 1.5px solid rgba(59,130,246,.18);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .stat-card .num { font-size: 22px; font-weight: 700; color: #1D4ED8; }
    .stat-card .lbl { font-size: 10px; color: #64748B; margin-top: 2px; }

    /* ── 채팅 메인 영역 ── */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    /* 말풍선 */
    .msg-row { display: flex; align-items: flex-end; gap: 10px; }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .msg-row.ai .msg-avatar  { background: linear-gradient(135deg,var(--blue),var(--purple)); }
    .msg-row.user .msg-avatar { background: rgba(255,255,255,.1); }

    .msg-bubble {
      max-width: 68%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }
    .msg-row.user .msg-bubble {
      background: linear-gradient(135deg, #1D4ED8, #7C3AED);
      color: #fff;
      border-radius: 18px 18px 4px 18px;
    }
    .msg-row.ai .msg-bubble {
      background: #FFFFFF;
      border: 1.5px solid rgba(59,130,246,.2);
      color: #0F172A;
      border-radius: 18px 18px 18px 4px;
    }

    .msg-time { font-size: 10px; color: #64748B; margin-top: 4px; text-align: right; }

    /* 영상 카드 */
    .video-card-row { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
    .video-card {
      background: #EEF2FF;
      border: 1.5px solid rgba(29,78,216,.25);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background .15s;
    }
    .video-card:hover { background: #E0E7FF; }
    .video-card .vc-thumb {
      width: 60px; height: 38px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(59,130,246,.1);
    }
    .video-card .vc-info { flex: 1; min-width: 0; }
    .video-card .vc-title { font-size: 12px; font-weight: 600; color: #1D4ED8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .video-card .vc-cat   { font-size: 10px; color: #64748B; margin-top: 2px; }

    /* 타이핑 인디케이터 */
    .typing-dots { display: flex; gap: 5px; align-items: center; padding: 6px 0; }
    .typing-dots span {
      width: 7px; height: 7px;
      background: #94A3B8;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* 웰컴 배너 */
    .welcome-banner {
      text-align: center;
      padding: 40px 20px 20px;
      color: #64748B;
    }
    .welcome-banner .big-icon { font-size: 56px; margin-bottom: 12px; }
    .welcome-banner h2 { font-size: 20px; color: #0F172A; margin-bottom: 8px; }
    .welcome-banner p  { font-size: 13px; }

    /* ── 입력창 ── */
    .chat-inputbar {
      border-top: 1.5px solid rgba(59,130,246,.2);
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
      background: #FFFFFF;
    }
    #chat-input {
      flex: 1;
      background: #FFFFFF;
      border: 1.5px solid rgba(59,130,246,.3);
      border-radius: 24px;
      color: #0F172A;
      font-size: 14px;
      outline: none;
      padding: 12px 18px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color .15s;
    }
    #chat-input::placeholder { color: #94A3B8; }
    #chat-input:focus { border-color: #1D4ED8; }
    #send-btn {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      border: none;
      border-radius: 50%;
      width: 44px; height: 44px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform .15s, opacity .15s;
    }
    #send-btn:hover  { transform: scale(1.08); }
    #send-btn:active { transform: scale(.95); }
    #send-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    #send-btn svg { width: 18px; height: 18px; fill: #fff; }

    /* ── 반응형 ── */
    @media (max-width: 768px) {
      .chat-sidebar { display: none; }
      .msg-bubble { max-width: 85%; }
      .chat-inputbar { padding: 10px 12px; }
    }
    @media (max-width: 639px) {
      .chatbot-container { height: calc(100vh - 120px) !important; margin: 8px !important; }
      .chat-inputbar { padding: 12px !important; }
      #chat-input { font-size: 16px !important; } /* iOS 줌 방지 */
      #send-btn { min-width: 44px; min-height: 44px; }
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<header class="chat-header">
  <div class="logo">🤖</div>
  <div>
    <h1>AI 학습 도우미</h1>
    <p>미래역량AI연구소 · Gemini 1.5 Flash 기반</p>
  </div>
  <div class="header-actions">
    <a href="index.html">홈</a>
    <a href="categories.html">카테고리</a>
    <a href="dashboard.html">대시보드</a>
  </div>
</header>

<!-- 메인 레이아웃 -->
<div class="chat-layout">

  <!-- 사이드바 -->
  <aside class="chat-sidebar">
    <div class="sidebar-section">
      <h3>빠른 질문</h3>
      <button class="quick-btn" data-q="AI 입문 영상 추천해줘"><span class="icon">🎬</span>AI 입문 영상 추천</button>
      <button class="quick-btn" data-q="GPT 활용법 알려줘"><span class="icon">💬</span>GPT 활용법</button>
      <button class="quick-btn" data-q="오늘 뭐 볼까?"><span class="icon">🎯</span>오늘 뭐 볼까?</button>
      <button class="quick-btn" data-q="프롬프트 잘 쓰는 법 알려줘"><span class="icon">✍️</span>프롬프트 작성법</button>
      <button class="quick-btn" data-q="AI 자동화 영상 추천해줘"><span class="icon">⚡</span>AI 자동화</button>
      <button class="quick-btn" data-q="초보자 학습 경로를 알려줘"><span class="icon">🗺️</span>초보자 학습 경로</button>
    </div>

    <div class="sidebar-section">
      <h3>내 학습 현황</h3>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="num" id="stat-total">—</div><div class="lbl">시청 완료</div></div>
        <div class="stat-card"><div class="num" id="stat-streak">—</div><div class="lbl">연속 학습일</div></div>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>대화 관리</h3>
      <button class="quick-btn" id="clear-btn"><span class="icon">🗑️</span>대화 초기화</button>
    </div>
  </aside>

  <!-- 채팅 메인 -->
  <main class="chat-main">
    <div id="chat-messages">
      <div class="welcome-banner" id="welcome-banner">
        <div class="big-icon">🤖</div>
        <h2>안녕하세요!</h2>
        <p>AI·ChatGPT·프롬프트 등 무엇이든 물어보세요.<br>영상도 추천해 드립니다.</p>
      </div>
    </div>

    <div class="chat-inputbar">
      <textarea id="chat-input" placeholder="질문을 입력하세요... (Enter: 전송, Shift+Enter: 줄바꿈)" rows="1" maxlength="500"></textarea>
      <button id="send-btn" aria-label="전송">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </main>

</div>

<!-- 스크립트 로드 -->
<script src="js/config.js"></script>
<script src="js/categories-data.js"></script>
<script src="js/supabase.js"></script>
<script src="js/gemini.js"></script>
<script src="js/learning-tracker.js"></script>
<script src="js/recommendations.js"></script>

<script>
// ─────────────────────────────────────────────
// 채팅 상태
// ─────────────────────────────────────────────
let _chatHistory  = [];
let _isLoading    = false;
let _allVideos    = [];

// ─────────────────────────────────────────────
// 초기화
// ─────────────────────────────────────────────
async function initPage() {
  // 영상 데이터 로드
  if (typeof getVideos === 'function') {
    const { data } = await getVideos(null, 1, null).catch(() => ({ data: [] }));
    _allVideos = data || [];
  }

  // 학습 통계 표시
  if (typeof getLearningStats === 'function') {
    const stats = await getLearningStats();
    document.getElementById('stat-total').textContent  = stats.totalWatched;
    document.getElementById('stat-streak').textContent = stats.streak + '일';
  }
}

// ─────────────────────────────────────────────
// 메시지 렌더
// ─────────────────────────────────────────────
function addMessage(role, text, videoCards = []) {
  const container = document.getElementById('chat-messages');
  const banner    = document.getElementById('welcome-banner');
  if (banner) banner.remove();

  const now = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? '👤' : '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');

  // 영상 카드
  if (videoCards.length > 0) {
    const cardRow = document.createElement('div');
    cardRow.className = 'video-card-row';
    videoCards.forEach((v) => {
      const card = document.createElement('div');
      card.className = 'video-card';
      card.setAttribute('role', 'link');
      card.innerHTML = `
        <img class="vc-thumb"
          src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg"
          alt="${escapeHtml(v.title)}"
          onerror="this.style.display='none'"
        />
        <div class="vc-info">
          <div class="vc-title">${escapeHtml(v.title)}</div>
          <div class="vc-cat">${v.category_id || ''}</div>
        </div>
      `;
      card.addEventListener('click', () => {
        window.open(`video.html?id=${v.id}`, '_blank');
      });
      cardRow.appendChild(card);
    });
    bubble.appendChild(cardRow);
  }

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = now;

  row.appendChild(avatar);
  const wrap = document.createElement('div');
  wrap.appendChild(bubble);
  wrap.appendChild(time);
  row.appendChild(wrap);

  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
  return row;
}

function showTyping() {
  const container = document.getElementById('chat-messages');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = '_typing';
  row.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-bubble">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
  `;
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
  return row;
}

function removeTyping() {
  document.getElementById('_typing')?.remove();
}

// ─────────────────────────────────────────────
// 메시지 전송
// ─────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text || _isLoading) return;

  input.value = '';
  autoResizeTextarea(input);

  addMessage('user', text);
  _chatHistory.push({ role: 'user', text });

  const sendBtn = document.getElementById('send-btn');
  sendBtn.disabled = true;
  _isLoading = true;

  const typingEl = showTyping();

  try {
    // 영상 컨텍스트 구성
    const videoContext = _allVideos
      .slice(0, 80)
      .map((v) => `[${v.id}] ${v.title} (${v.category_id})`)
      .join('\n');

    let response = '';
    if (typeof chatWithRAG === 'function') {
      response = await chatWithRAG(text, videoContext, _chatHistory.slice(-8));
    } else if (typeof askGemini === 'function') {
      response = await askGemini(text, videoContext);
    } else {
      response = 'AI 모듈이 아직 준비 중입니다. 잠시 후 다시 시도해 주세요.';
    }

    removeTyping();

    // 응답에서 영상 제목 추출 → 카드 생성
    const videoCards = extractVideoCards(response);
    addMessage('ai', response, videoCards);
    _chatHistory.push({ role: 'ai', text: response });

  } catch (err) {
    removeTyping();
    addMessage('ai', `오류: ${err.message}`);
  } finally {
    _isLoading    = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

function extractVideoCards(responseText) {
  if (!_allVideos.length) return [];
  return _allVideos
    .filter((v) => v.title && responseText.includes(v.title.substring(0, 12)))
    .slice(0, 3);
}

// ─────────────────────────────────────────────
// 유틸
// ─────────────────────────────────────────────
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function autoResizeTextarea(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ─────────────────────────────────────────────
// 이벤트 바인딩
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initPage();

  const input   = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');

  sendBtn.addEventListener('click', sendMessage);

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.addEventListener('input', () => autoResizeTextarea(input));

  // 사이드바 빠른 질문
  document.querySelectorAll('.quick-btn[data-q]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const q = btn.dataset.q;
      document.getElementById('chat-input').value = q;
      sendMessage();
    });
  });

  // 대화 초기화
  document.getElementById('clear-btn').addEventListener('click', () => {
    _chatHistory = [];
    const container = document.getElementById('chat-messages');
    container.innerHTML = `
      <div class="welcome-banner" id="welcome-banner">
        <div class="big-icon">🤖</div>
        <h2>대화가 초기화되었습니다.</h2>
        <p>새로운 질문을 입력해 주세요.</p>
      </div>
    `;
  });
});
</script>

<!-- 위젯으로도 사용 가능 (다른 페이지 삽입용) -->
<script src="js/chatbot-widget.js"></script>

<div id="siteFooter"></div>
<script>if(typeof injectFooter==='function')injectFooter();</script>

</body>
</html>
